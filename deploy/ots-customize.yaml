# ots app-layer hardening. Mounted read-only into the container at
# /etc/ots/ots-customize.yaml and loaded via the CUSTOMIZE env var.
#
# Upstream defaults ~115 MiB for maxSecretSize — far too generous for a
# public instance. 256 KiB fits passwords, SSH keys, API tokens, and small
# files while capping upload-bomb damage.

maxSecretSize: 262144

# /metrics is denied for everyone. A subnet allowlist does NOT work here:
# cloudflared shares the compose bridge network with the app, so its
# container IP falls inside any 172.16.0.0/12-style CIDR and would pass
# the check — which would expose /metrics to the public internet via the
# tunnel. Empty list makes the mux matcher return false for every request;
# the route falls through to the asset-delivery handler and ots returns
# 404. If a Prometheus scraper is ever added to this stack, allowlist its
# specific container /32, not a subnet.
metricsAllowedSubnets: []
